[common]
default_envs = rev_6
platform = espressif32@7.0.1
framework = arduino

[platformio]
boards_dir = boards






; ------------------------------------------
; MICRO JOURNAL on CARDPUTER
; With Keypad
; ------------------------------------------
[env:m5stack-stamps3]
platform = espressif32
board = m5stack-stamps3
framework = arduino

lib_deps = 
  ArduinoJson
  https://github.com/m5stack/M5Cardputer
  https://github.com/Bodmer/TFT_eSPI
  https://github.com/Bodmer/U8g2_for_TFT_eSPI
  https://github.com/h2zero/NimBLE-Arduino.git

upload_speed = 115200
monitor_speed = 115200

board_upload.flash_size=8MB
board_upload.maximum_size=8388608
board_build.filesystem=spiffs
board_build.partitions = partition_esp32s3.csv


build_src_filter = 
  -<*> 
  +<main.cpp>
  +<app/*>  
  ;
  +<display/display.*>
  +<display/CARDPUTER/*>
  ;
  +<keyboard/keyboard.*>
  +<keyboard/Locale/*>
  +<keyboard/CardPuter/*>
  +<keyboard/BLE/*>
  +<keyboard/USBHost/*>
  ;
  +<service/Tools/*>
  +<service/Editor/*>
  +<service/Updater/*>
  +<service/WifiEntry/*>
  +<service/Buffer/*>
  +<service/Sync/*>
  +<service/WordCounter/*>
  +<service/Send/*>
  +<service/BLEServer/*>

lib_ignore = 
  FatFSUSB
  USBHIDBoot

build_unflags =
  -DARDUINO_USB_MODE

build_flags = 
  ;
  ;-D DEBUG
  ;-D DEBUG_FILE
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=0
  
  ; Configuration
  -D CARDPUTER
  -D BOARD_ESP32_S3
  -D USE_BLESERVER
  -D GIF_BUFFER_SIZE=320
  -D FIRMWARE=\"/firmware_cardputer.bin\"

  ; SD Card
  -D SD_SCLK=40
  -D SD_MISO=39
  -D SD_MOSI=14
  -D SD_CS=12
  -D SPI_FREQUENCY=27000000
  -D TOUCH_CS=-1





; ------------------------------------------
; MICRO JOURNAL REVISION 4 with 68 Keyboard
; With Keypad
; ------------------------------------------
[env:rev_4_68]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 1.5m
board = waveshare_rp2040_lcd_0_96

lib_deps =
  ArduinoJson
  https://github.com/Bodmer/TFT_eSPI
  https://github.com/Bodmer/U8g2_for_TFT_eSPI
  https://github.com/adafruit/Adafruit_Keypad
  https://github.com/mathertel/RotaryEncoder.git
  Adafruit TinyUSB Library
  https://github.com/bitbank2/AnimatedGIF

build_src_filter =
  -<*>
  +<main.cpp>
  +<app/*>
  ;
  +<display/display.*>
  +<display/ST7735/*>
  ;
  +<keyboard/keyboard.*>
  +<keyboard/Keypad/Keypad.*>
  +<keyboard/Keypad/68/*>
  +<keyboard/Knob/*>
  +<keyboard/Locale/*>
  ;
  +<service/Tools/*>
  +<service/Editor/*>
  +<service/MassStorage/*>
  +<service/GIF/*>
  +<service/Battery/*>
  +<service/WordCounter/*>
  +<service/Send/*>

lib_ignore =
  EPD
  EspUsbHost
  ESP32 BLE Keyboard
  FatFSUSB
  Keyboard
  HID_Keyboard

build_flags =
  ;
  ;-D DEBUG

  ; Device Configuration
  -D BOARD_PICO
  -D USE_TINYUSB
  -D KEYPAD_68
  -D KNOB
  -D USE_MSC ; mass storage
  -D BATTERY=27 ; battery level measuring pin
  -D GIF_BUFFER_SIZE=160 ; Optimum is >= GIF width or integral division of width

  ; Display Configuration
  -D USER_SETUP_LOADED=1
  -D ST7735_DRIVER=1
  -D ST7735_GREENTAB160x80=1
  -D TFT_MOSI=11     
  -D TFT_SCLK=10
  -D TFT_CS=9
  -D TFT_DC=8
  -D TFT_RST=12
  -D TFT_BL=25
  -D TFT_WIDTH=80
  -D TFT_HEIGHT=160
  -D TFT_INVERSION_ON
  -D RP2040_PIO_CLK_DIV=1
  -D TFT_SPI_PORT=1
  -D TOUCH_CS=-1
  -D SPI_FREQUENCY=27000000
  -D LOAD_GLCD
  -D SMOOTH_FONT










; ------------------------------------------
; MICRO JOURNAL REVISION 5
; With USBHOST
; ------------------------------------------
[env:rev_5_ili9341]
extends = common
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = dio_opi
board_build.arduino_psram = enabled
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_upload.maximum_size = 4128768
board_build.filesystem = fatfs
board_build.partitions = partition_esp32s3_rev8_16mb.csv
upload_speed =  921600
monitor_speed = 115200
monitor_filters =
	default
	esp32_exception_decoder

lib_deps = 
  ArduinoJson
  https://github.com/Bodmer/TFT_eSPI
  https://github.com/Bodmer/U8g2_for_TFT_eSPI
  https://github.com/bitbank2/AnimatedGIF
  https://github.com/h2zero/NimBLE-Arduino.git
  https://github.com/LennartHennigs/Button2.git

build_src_filter = 
  -<*> 
  +<main.cpp>
  +<app/*>  
  ;
  +<display/display.*>
  +<display/ILI9341/*>
  ;
  +<keyboard/keyboard.*>
  +<keyboard/USBHost/*>
  +<keyboard/Button/*>
  +<keyboard/Locale/*>
  +<keyboard/BLE/*>
  ;
  +<service/Tools/*>
  +<service/Editor/*>
  +<service/Updater/*>
  +<service/WifiEntry/*>
  +<service/Buffer/*>
  +<service/Sync/*>
  +<service/GIF/*>
  +<service/BLEServer/*>
  +<service/WordCounter/*>
  +<service/Send/*>

lib_ignore = 
  FatFSUSB
  EPD
  USBHIDBoot
  
build_flags = 
  ;
  ;-D USE_SERIAL_KEYBOARD
  
  ; Configuration
  -D REV5
  -D USBHOST
  -D BOARD_ESP32_S3
  -D USE_BLESERVER
  -D BOARD_HAS_PSRAM
  -D GIF_BUFFER_SIZE=320
  -D FIRMWARE=\"/firmware_rev_5_ili9341.bin\"
  
  ; DISPLAY
  -D USER_SETUP_LOADED=1
  -D ILI9341_DRIVER=1
  -D TFT_MISO=13
  -D TFT_MOSI=11
  -D TFT_SCLK=12
  -D TFT_CS=10
  -D SD_CS=9
  -D TFT_DC=46
  -D TFT_RST=3
  -D LOAD_GLCD=1
  -D LOAD_FONT2
  -D LOAD_FONT4
  -D LOAD_FONT6
  -D LOAD_FONT7
  -D LOAD_FONT8
  -D LOAD_GFXFF
  -D SMOOTH_FONT
  -D GFXFF
  -D SPI_FREQUENCY=27000000
  -D TOUCH_CS=-1


  ; ESP32 S3
  -mfix-esp32-psram-cache-issue
  -DCONFIG_SPIRAM_CACHE_WORKAROUND
  -mfix-esp32-psram-cache-strategy=memw



; ------------------------------------------
; MICRO JOURNAL REVISION 5
; With USBHOST and ST7789 display
; ------------------------------------------
[env:rev_5_st7789]
extends = env:rev_5_ili9341
build_unflags =
  -D ILI9341_DRIVER=1
  -D FIRMWARE=\"/firmware_rev_5_ili9341.bin\"
build_flags =
  ${env:rev_5_ili9341.build_flags}
  -D FIRMWARE=\"/firmware_rev_5_st7789.bin\"
  -D ST7789_DRIVER=1
  -D TFT_INVERSION_OFF
  -D TFT_RGB_ORDER=TFT_BGR
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320







